
- name: TEST
  env:
    GH_TOKEN: "${ steps.generate-token.outputs.token }}"
  run: |
    curl -X POST \
      -H "Accept: application/vnd.github+json" \
      -H "Authorization: Bearer $GH_TOKEN" \
      https://api.github.com/repos/TEST/dispatches \
      -d '{"event_type":"update-design","client_payload":{"ref":"main"}}'

